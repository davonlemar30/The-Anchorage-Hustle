<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>907 Hustle</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <section id="startScreen" class="screen card start-card">
        <h1>907 HUSTLE</h1>
        <p class="subtitle">A grounded Anchorage hustle story.</p>
        <label for="playerName">Your name</label>
        <input id="playerName" type="text" maxlength="20" placeholder="Enter a street name" />
        <button id="startGameBtn" class="btn primary">Start Hustle</button>
      </section>

      <section id="gameScreen" class="screen hidden game-shell">
        <header class="hud-bar card">
          <div id="hudPrimary" class="hud-primary"></div>
          <div id="hudStats" class="hud-chips"></div>
          <button id="menuToggleBtn" class="btn ghost menu-toggle" type="button">Menu</button>
        </header>

        <section class="card story-panel">
          <h3 id="storyTitle">Opening</h3>
          <p id="storyText" class="story-text"></p>
          <div id="choiceButtons" class="choice-row"></div>
        </section>

        <nav class="quick-bar card" aria-label="Quick actions">
          <button id="openActionsBtn" class="btn primary" type="button">Actions</button>
          <button id="openJournalBtn" class="btn" type="button">Journal</button>
          <button id="openSceneBtn" class="btn" type="button">Scene</button>
        </nav>

        <section id="actionsSheet" class="overlay hidden" aria-hidden="true">
          <div class="overlay-backdrop" data-close-overlay="actions"></div>
          <div class="overlay-panel sheet-panel">
            <header class="overlay-header">
              <h3 id="actionsTitle">Actions</h3>
              <div class="overlay-header-actions">
                <button id="actionsBackBtn" class="btn ghost" type="button">Back</button>
                <button id="closeActionsBtn" class="btn ghost" type="button">Close</button>
              </div>
            </header>
            <div id="actionsPanel" class="overlay-list"></div>
          </div>
        </section>

        <section id="journalOverlay" class="overlay hidden" aria-hidden="true">
          <div class="overlay-backdrop" data-close-overlay="journal"></div>
          <div class="overlay-panel">
            <header class="overlay-header">
              <h3 id="detailTitle">Journal</h3>
              <button id="closeJournalBtn" class="btn ghost" type="button">Close</button>
            </header>
            <div id="detailPanel" class="event-log"></div>
          </div>
        </section>

        <section id="sceneOverlay" class="overlay hidden" aria-hidden="true">
          <div class="overlay-backdrop" data-close-overlay="scene"></div>
          <div class="overlay-panel">
            <header class="overlay-header">
              <h3>Scene</h3>
              <button id="closeSceneBtn" class="btn ghost" type="button">Close</button>
            </header>
            <figure class="scene-art-frame">
              <img
                id="sceneArt"
                class="scene-art-image"
                src="assets/cousins-apt-placeholder.svg"
                alt="Gritty pixel-style view of cousin's apartment in Anchorage."
              />
            </figure>
            <p id="sceneText" class="scene-copy"></p>
          </div>
        </section>

        <section id="menuOverlay" class="overlay hidden" aria-hidden="true">
          <div class="overlay-backdrop" data-close-overlay="menu"></div>
          <div class="overlay-panel menu-panel">
            <header class="overlay-header">
              <h3>Game Menu</h3>
              <button id="closeMenuBtn" class="btn ghost" type="button">Close</button>
            </header>
            <div class="menu-actions">
              <button id="saveBtn" class="btn">Save</button>
              <button id="loadBtn" class="btn">Load</button>
              <button id="restartBtn" class="btn danger">Restart</button>
            </div>
          </div>
        </section>
      </section>

      <section id="endScreen" class="screen hidden card">
        <h2>30 Days Complete</h2>
        <p id="outcomeSummary"></p>
        <div id="finalStats" class="list"></div>
        <button id="playAgainBtn" class="btn primary">Play Again</button>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
