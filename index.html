<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>907 Hustle</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <section id="startScreen" class="screen card start-card">
        <h1>907 HUSTLE</h1>
        <p class="subtitle">A grounded Anchorage hustle story.</p>
        <label for="playerName">Your name</label>
        <input id="playerName" type="text" maxlength="20" placeholder="Enter a street name" />
        <button id="startGameBtn" class="btn primary">Start Hustle</button>
      </section>

      <section id="gameScreen" class="screen hidden hud-shell">
        <header class="hud-bar card">
          <div id="hudPrimary" class="hud-primary"></div>
          <div id="hudStats" class="hud-stats"></div>
          <div class="hud-actions">
            <button id="saveBtn" class="btn ghost">Save</button>
            <button id="loadBtn" class="btn ghost">Load</button>
            <button id="restartBtn" class="btn danger">Restart</button>
          </div>
        </header>

        <div class="hud-grid">
          <aside class="left-stack">
            <div class="mobile-pane-switch" role="tablist" aria-label="Control panels">
              <button id="mobileNavTab" class="btn ghost mobile-pane-btn active" type="button">Navigation</button>
              <button id="mobileOptionsTab" class="btn ghost mobile-pane-btn" type="button">Options</button>
            </div>

            <section id="navSection" class="card left-panel">
              <h3>Navigation</h3>
              <div id="navRail" class="nav-rail"></div>
            </section>
            <section id="optionsSection" class="card left-panel">
              <h3 id="submenuTitle">Options</h3>
              <div id="submenuPanel" class="submenu-list"></div>
            </section>
          </aside>

          <section class="right-stack">
            <section class="card scene-panel">
              <h3>Scene</h3>
              <figure class="scene-art-frame">
                <img
                  id="sceneArt"
                  class="scene-art-image"
                  src="assets/cousins-apt-placeholder.svg"
                  alt="Gritty pixel-style view of cousin's apartment in Anchorage."
                />
              </figure>
              <p id="sceneText" class="scene-copy"></p>
            </section>

            <section class="card story-panel">
              <h3 id="storyTitle">Opening</h3>
              <p id="storyText" class="story-text"></p>
              <div id="choiceButtons" class="choice-row"></div>
            </section>

            <section class="card system-panel">
              <h3 id="detailTitle">Current Focus</h3>
              <div id="detailPanel" class="event-log"></div>
            </section>
          </section>
        </div>
      </section>

      <section id="endScreen" class="screen hidden card">
        <h2>30 Days Complete</h2>
        <p id="outcomeSummary"></p>
        <div id="finalStats" class="list"></div>
        <button id="playAgainBtn" class="btn primary">Play Again</button>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
