<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>907 Hustle - Drug Trade Sim</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="status-bar panel">
        <h1>907 HUSTLE</h1>
        <div id="hudStats" class="status-stats"></div>
      </header>

      <section class="context-row panel">
        <div>
          <p class="eyebrow">Current Screen</p>
          <h2 id="screenTitle">Drug Market</h2>
        </div>
        <div class="context-actions">
          <button id="stayBtn" class="btn secondary" type="button">Stay Here (+1 Tick)</button>
          <button id="travelModalBtn" class="btn primary" type="button">Travel / Fly To</button>
        </div>
      </section>

      <nav class="primary-nav panel" id="primaryNav"></nav>
      <nav class="secondary-nav panel" id="secondaryNav"></nav>

      <section id="mainPanel" class="main-panel panel"></section>

      <section class="message-strip panel">
        <div class="panel-header">
          <h3>Street Feed</h3>
          <button id="clearFeedBtn" class="btn ghost" type="button">Clear</button>
        </div>
        <div id="eventFeed" class="event-feed"></div>
      </section>
    </main>

    <div id="modalBackdrop" class="modal-backdrop hidden">
      <div class="modal panel" role="dialog" aria-modal="true">
        <div class="panel-header">
          <h3 id="modalTitle">Modal</h3>
          <button id="modalCloseBtn" class="btn ghost" type="button">Close</button>
        </div>
        <div id="modalBody" class="modal-body"></div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
