            <div className="combat-hp-box">
              <div className="combat-hp-label">You</div>
              <div className="combat-hp-val" style={{color:G.health<40?"var(--red2)":"var(--money2)"}}>{G.health} HP</div>
            </div>
            <div className="combat-hp-box">
              <div className="combat-hp-label">{enemy.name}</div>
              <div className="combat-hp-val" style={{color:"var(--red2)"}}>{Math.max(0,enemy.curHp)} HP</div>
              <div style={{marginTop:4,height:4,background:"var(--plate)",borderRadius:1,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${hpPct}%`,background:"var(--red)",transition:"width .2s"}}/>
              </div>
            </div>
          </div>
          <div className="combat-log">
            {log.map((l,i)=><div key={i} style={{color:l.includes("You hit")||l.includes("Drew")||l.includes("Took down")||l.includes("Dropped")?"var(--money2)":l.includes("hits you")||l.includes("Failed")?"var(--red2)":"var(--ink-muted)"}}>{l}</div>)}
          </div>
          <div className="combat-actions">
            <button className="btn btn-danger" style={{flexDirection:"row"}} onClick={()=>dispatch({type:"COMBAT_ACTION",act:"fight"})}>Fight</button>
            <button className="btn btn-secondary" style={{flexDirection:"row"}} onClick={()=>dispatch({type:"COMBAT_ACTION",act:"flee"})}>Run</button>
            <button className="btn btn-primary" style={{flexDirection:"row",fontSize:".72rem"}} disabled={G.cash<enemy.bribeCost} onClick={()=>dispatch({type:"COMBAT_ACTION",act:"bribe"})}>Talk it down (${enemy.bribeCost})</button>
            {hasBurner&&!hasReal&&<button className="btn btn-teal" style={{flexDirection:"row"}} onClick={()=>dispatch({type:"COMBAT_ACTION",act:"draw_burner"})}>Pull the burner</button>}
            {hasReal&&<button className="btn btn-teal" style={{flexDirection:"row"}} onClick={()=>dispatch({type:"COMBAT_ACTION",act:"draw_real"})}>Draw the real piece</button>}
          </div>
        </div>
      </div>
    </div>
  );
}

function DaySummaryModal({summary,dispatch}) {
  if(!summary) return null;
  const pnlTone=summary.pnl>=0?"var(--money2)":"var(--red2)";
  return (
    <div className="modal-backdrop">
      <div className="modal confirm-modal">
        <div className="confirm-body">
          <div className="confirm-title">End of Day {summary.day}</div>
          <div className="confirm-msg" style={{textAlign:"left",lineHeight:1.7}}>
            <div>Daily P/L: <strong style={{color:pnlTone}}>{summary.pnl>=0?"+":""}${summary.pnl.toLocaleString()}</strong></div>
            <div>Biggest Sale: <strong>${summary.biggestSale.toLocaleString()}</strong></div>
            <div>Net Worth: <strong>${summary.netWorth.toLocaleString()}</strong></div>
            <div>Debt: <strong>{summary.debt>0?`$${summary.debt.toLocaleString()}`:"Clear"}</strong>{summary.debtOverdue?" · OVERDUE":""}</div>
            <div>Heat: <strong>{summary.heat}</strong> ({summary.heatDelta>=0?"+":""}{summary.heatDelta})</div>
            {summary.areaTop&&<div>Strongest Area Today: <strong>{AREAS.find(a=>a.id===summary.areaTop[0])?.name||summary.areaTop[0]}</strong> (${summary.areaTop[1].toLocaleString()})</div>}
            <div style={{marginTop:8,color:"var(--gold2)"}}>{summary.note}</div>
          </div>
          <div className="confirm-btns">
            <button className="btn btn-primary" onClick={()=>dispatch({type:"DISMISS_DAY_SUMMARY"})}>Back to Work</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── GAME OVER ─────────────────────────────────────────────────────────────────
function GameOverModal({G,dispatch}) {
  const netWorth=netWorthOf(G);
  const rank=G.rep>=60?"Boss":G.rep>=35?"Shot Caller":G.rep>=18?"Runner":"Hustler";
  const won=G.day>30&&G.health>0;
  const tier=G.runSummary?.tier;
  const title=tier==="boss_tier"?"Boss-Tier Success":tier==="success"?"Run Complete — Success":tier==="survived"?"Survived, Came Up Short":tier==="came_up_short"?"Failed Run":"Game Over";
  const styleLabel=G.runSummary?.style||getRunStyleLabel(G);
  const bestAreaName=AREAS.find(a=>a.id===G.runSummary?.bestArea?.id)?.name||"—";
  return (
    <div className="modal-backdrop">
      <div className="modal confirm-modal">
        <div className="gameover-body">
          <div className="gameover-title">{won?title:"Game Over"}</div>
          <div className="gameover-sub">
            {won?`Day 30 evaluation complete.`:`You got taken out on Day ${G.day}.`}<br/>
            Run Style: {styleLabel}<br/>
            Net Worth: ${netWorth.toLocaleString()} · Debt: ${G.dre.loan.toLocaleString()} · Heat: {G.heat}<br/>
            Target: ${RUN_GOAL_NET_WORTH.toLocaleString()}+ · debt clear · heat under {RUN_GOAL_HEAT_CAP}<br/>
            Rep: {G.rep} · Rank: {rank}<br/>
            Best Trade: ${(G.runSummary?.bestTrade||G.runStats?.bestTrade||0).toLocaleString()} · Biggest Sale: ${(G.runSummary?.biggestSale||G.runStats?.biggestSale||0).toLocaleString()}<br/>
            Strongest Area: {bestAreaName} · Seizures: {G.runSummary?.seizures||G.runStats?.seizures||0}
          </div>
          <button className="btn btn-primary" style={{width:"100%",padding:"14px",flexDirection:"row",fontSize:".88rem"}} onClick={()=>dispatch({type:"NEW_GAME"})}>New Run</button>
        </div>
      </div>
    </div>
  );
}

function App() {
  const saved=()=>{try{
    const s=localStorage.getItem(SAVE_KEY); if(!s) return null;
    const data=JSON.parse(s);
    if(data?.assets?.includes("burner_pack")){
      data.assets=data.assets.filter(x=>x!=="burner_pack");
      if(!data.assets.includes("burner_phone")) data.assets.push("burner_phone");
    }
    data.avgCostBasis = data.avgCostBasis || Object.fromEntries(DRUGS.map(d=>[d.id,0]));
    for (const drug of DRUGS) {
      const v = Number(data.avgCostBasis?.[drug.id] || 0);
      data.avgCostBasis[drug.id] = Number.isFinite(v) && v >= 0 ? v : 0;
    }
    return data;
  }catch{return null;}};
  const [G,dispatch]=useReducer(reducer,null,()=>saved()||initGame());
  const [tab,setTab]=useState("market");
  const [travel,setTravel]=useState(false);
  const [confirm,setConfirm]=useState(null);
  const [menuOpen,setMenuOpen]=useState(false);
  const [robOpen,setRobOpen]=useState(false);
  const [topSubmenu,setTopSubmenu]=useState(null);

  useEffect(()=>{try{localStorage.setItem(SAVE_KEY,JSON.stringify(G));}catch{};},[G]);
  const area=AREAS.find(a=>a.id===G.locationId);
  const cargo=Object.values(G.inventory).reduce((s,v)=>s+v,0);
  const heatHi=G.heat>=8,heatMid=G.heat>=4;
  const hpLow=G.health<40;
  const worth=netWorthOf(G);
  const heatBand=getHeatBand(G.heat);
  const dreOverdue=G.dre.loan>0&&G.day>G.dre.deadline;
  const debtState=debtEscalationStatus(G);
  const hasManualSave=(()=>{try{return !!localStorage.getItem(MANUAL_SAVE_KEY);}catch{return false;}})();
  const daysLeft=Math.max(0,31-G.day);
  const nextContact=!isDreUnlocked(G)?"Dre @ 4 rep or first loan":!isPlugUnlocked(G)?"Plug @ 8 rep + $500 bank":!isLookoutUnlocked(G)?"Lookout @ heat 4 or rep 6":"All contacts online";
  const nextCat=!categoryStatus(G,"POWDER").unlocked?"Powder @ 4 rep":!categoryStatus(G,"OPIATE").unlocked?"Opiate @ rep 6 + Dre":!categoryStatus(G,"PARTY").unlocked?"Party/Syrup via Plug":"All categories open";
  const nextUpgrade=UPGRADES.filter(u=>!G.assets.includes(u.id)).sort((a,b)=>a.cost-b.cost)[0];
  const placesGroup = [
    { id:"stash", label:"Stash" },
    { id:"shop", label:"Shopping" },
    { id:"hospital", label:"Clinic" },
  ];
  const infoGroup = [
    { id:"world_prices", label:"World Drug Prices" },
    { id:"bank", label:"Finances" },
    ...(hasPhoneAccess(G) ? [{ id:"contacts", label:"Phone" }] : []),
    { id:"stats", label:"Stats" },
  ];
  const topTabs = [
    { id:"market", label:"Market", icon:"mkt", direct:true },
    { id:"places", label:"Places", icon:"travel", group:placesGroup },
    { id:"info", label:"Info", icon:"stats", group:infoGroup },
  ];
  const placesActive = placesGroup.some((item)=>item.id===tab);
  const infoActive = infoGroup.some((item)=>item.id===tab);

  return (
    <div className="app">
      {/* HUD */}
      <header className="panel hud">
        <div className="logo">907 <em>HUSTLE</em><span className="logo-drip">Anchorage Run</span></div>
        <button className="btn btn-secondary" style={{padding:"6px 10px",fontSize:".68rem"}} onClick={()=>setMenuOpen(true)}>Menu</button>
        <div className="chips">
          <Chip icon="cash" label="Cash"  value={`$${G.cash.toLocaleString()}`}     cls="chip-cash"/>
          <Chip icon="day"  label="Day"   value={`${G.day}/30 · ${SLOTS[G.tick-1]}`}/>
          <Chip icon="loc"  label="Area"  value={area?.name}/>
          <Chip icon="heat" label="Heat"  value={`${G.heat} · ${heatBand.label} (${heatBand.range})`} cls={heatHi?"chip-heat chip-heat-hi":heatMid?"chip-heat":""}/>
          <Chip icon="bank" label="Debt" value={G.dre.loan>0?`$${G.dre.loan.toLocaleString()} · ${debtState.short}`:"Clear"} cls={dreOverdue?"chip-heat":""}/>
          <Chip icon="rep"  label="Rep"   value={`${G.rep}`} cls="chip-rep"/>
        </div>
        <div style={{gridColumn:"1/-1",marginTop:6,fontSize:".64rem",color:heatBand.tone==="bad"?"var(--red2)":heatBand.tone==="warn"?"#d9a03a":"var(--ink-muted)",fontFamily:"var(--font-ui)",fontWeight:700,letterSpacing:".08em",textTransform:"uppercase"}}>
          Heat status: {heatBand.label} ({heatBand.range}) · {heatBand.note}
        </div>
      </header>

      {/* NAV */}
      <div className="nav-wrap">
        <nav className="nav">
          {topTabs.map((t)=>(
            <button
              key={t.id}
              className={`tab${(t.id==="places"&&placesActive)||(t.id==="info"&&infoActive)||tab===t.id?" active":""}`}
              onClick={()=>{
                if (t.group) {
                  const nextOpen = topSubmenu===t.id ? null : t.id;
                  setTopSubmenu(nextOpen);
                  const groupActive=t.group.some((item)=>item.id===tab);
                  if (!groupActive) setTab(t.group[0].id);
                  return;
                }
                setTab(t.id);
                setTopSubmenu(null);
              }}
            >
              <Ic n={t.icon} sz={14}/>{t.label}
            </button>
          ))}
        </nav>
        {topSubmenu==="places" && (
          <div className="nav-submenu-row">
            {placesGroup.map((item)=>(
              <button
                key={item.id}
                className={`nav-submenu-item${tab===item.id?" active":""}`}
                onClick={()=>setTab(item.id)}
              >
                {item.label}
              </button>
            ))}
          </div>
        )}
        {topSubmenu==="info" && (
          <div className="nav-submenu-row">
            {infoGroup.map((item)=>(
              <button
                key={item.id}
                className={`nav-submenu-item${tab===item.id?" active":""}`}
                onClick={()=>setTab(item.id)}
              >
                {item.label}
              </button>
            ))}
          </div>
        )}
      </div>

      {/* MAIN */}
      <main className="main-panel panel">
        {tab==="market"   &&<MarketScreen   G={G} dispatch={dispatch}/>}
        {tab==="world_prices" &&<WorldPricesScreen G={G}/>}
        {tab==="stash"    &&<StashScreen    G={G} dispatch={dispatch}/>}
        {tab==="bank"     &&<BankScreen     G={G} dispatch={dispatch}/>}
        {tab==="shop"     &&<ShopScreen     G={G} dispatch={dispatch}/>}
        {tab==="hospital" &&<HospitalScreen G={G} dispatch={dispatch}/>}
        {tab==="contacts" && hasPhoneAccess(G) && <ContactsScreen G={G} dispatch={dispatch}/>}
        {tab==="stats"    &&<StatsScreen    G={G}/>}
      </main>

      {/* FEED */}
      <section className="panel feed-panel">
        <div className="feed-ph">
          <Ic n="stats" sz={12} col="var(--ink-muted)"/>
          <span className="feed-ph-title">Street Feed</span>
          <button className="btn btn-ghost" style={{marginLeft:"auto"}} onClick={()=>dispatch({type:"CLEAR_FEED"})}>Clear</button>
        </div>
        <div className="feed-body">
          {G.feed.map((e,i)=>(
            <div key={i} className={`feed-entry${e.tone==="good"?" feed-good":e.tone==="bad"?" feed-bad":e.tone==="warn"?" feed-warn":""}`}>
              <span className="feed-stamp">{e.stamp}</span>{e.text}
            </div>
          ))}
          {G.feed.length===0&&<div style={{color:"var(--ink-muted)",fontSize:".7rem",padding:"4px 0",fontFamily:"var(--font-ui)",fontWeight:700,letterSpacing:".08em",textTransform:"uppercase"}}>No activity yet.</div>}
        </div>
      </section>

      {/* ACTION BAR */}
      <div className="action-bar">
        <button className="btn btn-secondary" onClick={()=>setTravel(true)}>
          <Ic n="travel" sz={13}/>Move<small>Leave {area?.name}</small>
        </button>
        <button className="btn btn-primary" onClick={()=>setConfirm({title:"Lay Low",msg:`Advance time to ${SLOTS[G.tick>=4?0:G.tick]}. Prices shift, events may trigger.`,action:()=>dispatch({type:"LAY_LOW"})})}>
          Lay Low<small>→ {SLOTS[G.tick>=4?0:G.tick]}</small>
        </button>
        <button className="btn btn-danger" style={{flex:.65}} onClick={()=>setRobOpen(true)}>
          Rob<small>Pick a target</small>
        </button>
        <button className="btn btn-secondary" style={{flex:.8}} onClick={()=>setMenuOpen(true)}>
          Menu<small>Save / Load / New</small>
        </button>
      </div>

      {/* MODALS */}
      {travel&&<TravelModal G={G} onTravel={(id)=>{dispatch({type:"TRAVEL",areaId:id});setTravel(false);}} onClose={()=>setTravel(false)}/>}
      {robOpen&&<RobTargetModal G={G} onPick={(id)=>{dispatch({type:"ROB",targetId:id});setRobOpen(false);}} onClose={()=>setRobOpen(false)}/>}
      {confirm&&<ConfirmModal title={confirm.title} msg={confirm.msg} onConfirm={()=>{confirm.action();setConfirm(null);}} onCancel={()=>setConfirm(null)}/>}
      {menuOpen&&<MenuModal
        hasManual={hasManualSave}
        onClose={()=>setMenuOpen(false)}
        onSave={()=>{try{localStorage.setItem(MANUAL_SAVE_KEY,JSON.stringify(G));}catch{} setMenuOpen(false);}}
        onLoad={()=>{try{const raw=localStorage.getItem(MANUAL_SAVE_KEY);if(raw){const data=JSON.parse(raw);localStorage.setItem(SAVE_KEY,JSON.stringify(data));window.location.reload();}}catch{} setMenuOpen(false);}}
        onNew={()=>{dispatch({type:"NEW_GAME"});setTab("market");setMenuOpen(false);}}
      />}
      {G.daySummary&&!G.gameOver&&<DaySummaryModal summary={G.daySummary} dispatch={dispatch}/>}
      {G.pendingEvent&&!G.gameOver&&!G.combatState&&!G.daySummary&&<EventModal ev={G.pendingEvent} dispatch={dispatch}/>}
      {G.combatState&&!G.gameOver&&<CombatModal G={G} dispatch={dispatch}/>}
      {G.gameOver&&<GameOverModal G={G} dispatch={dispatch}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
